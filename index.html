<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Who Misses You? 💌 | Reveal The Truth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fce4ec 0%, #ffe9e4 100%);
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .quiz-card {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 248, 245, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 3rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }

    .quiz-header {
      background: #ffb7c5;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: #2d1b2e;
    }

    .quiz-header h1 {
      font-size: 2.4rem;
      letter-spacing: -0.5px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .quiz-header p {
      font-size: 1.1rem;
      opacity: 0.85;
      font-weight: 500;
    }

    .progress-container {
      background: #ffdfe4;
      border-radius: 40px;
      margin: 1.5rem 2rem 0.5rem 2rem;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: #e8436e;
      width: 0%;
      height: 100%;
      transition: width 0.3s ease;
    }

    .step-counter {
      text-align: right;
      font-size: 0.8rem;
      padding: 0 2rem 0.5rem;
      color: #b95c72;
      font-weight: 600;
    }

    .quiz-body {
      padding: 1.8rem 2rem 2rem;
    }

    .question-text {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 1.8rem;
      color: #2c1a2d;
      line-height: 1.3;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 2rem;
    }

    .option-btn {
      background: #fff0f2;
      border: 1.5px solid #ffc0cb;
      border-radius: 60px;
      padding: 1rem 1.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      color: #3b2a3a;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .option-btn:hover {
      background: #ffe2e8;
      border-color: #e85d8a;
      transform: scale(0.98);
    }

    .option-btn.selected {
      background: #e8436e;
      border-color: #e8436e;
      color: white;
      box-shadow: 0 8px 14px -8px rgba(232, 67, 110, 0.4);
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 0.8rem;
      gap: 1rem;
    }

    .btn {
      border: none;
      background: #f3cdd4;
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: #e8436e;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .btn-primary:hover {
      background: #d62b5a;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #ffe0e5;
      color: #6b3e4a;
    }

    .btn-secondary:hover {
      background: #ffd0d8;
    }

    .pre-result-box, .result-box {
      text-align: center;
      background: #fff7f9;
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      margin-top: 0.5rem;
    }

    .progress-ring {
      margin: 1rem auto;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 5px solid #ffcdd9;
      border-top: 5px solid #e8436e;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .timer-box {
      background: #ffeef2;
      border-radius: 60px;
      padding: 0.75rem 1rem;
      margin: 1.2rem 0;
      font-weight: 600;
      font-size: 1rem;
      color: #b13e62;
    }

    .offer-btn {
      background: #ffd966;
      border: none;
      border-radius: 60px;
      padding: 1rem;
      font-weight: 800;
      font-size: 1.2rem;
      width: 100%;
      margin-top: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      color: #3b2a2a;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .offer-btn:hover {
      background: #ffcd3c;
      transform: scale(0.98);
    }

    .result-text {
      font-size: 1.7rem;
      font-weight: 800;
      margin: 1rem 0;
      background: #ffecf0;
      padding: 1.2rem;
      border-radius: 3rem;
      line-height: 1.3;
    }

    .restart-btn {
      background: #e8436e;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin-top: 1.8rem;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 1rem;
      background: #ffebed;
      color: #a55a6e;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 500px) {
      .quiz-body {
        padding: 1.5rem;
      }
      .question-text {
        font-size: 1.4rem;
      }
      .result-text {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
<div class="quiz-card" id="quizApp">
  <div class="quiz-header">
    <h1>💌 Who misses you? <span>🔮</span></h1>
    <p>Answer 5 quick questions — someone real is thinking about you right now.</p>
  </div>
  <div class="progress-container">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="step-counter" id="stepCounter">Question 1 / 5</div>

  <div class="quiz-body" id="quizBody"></div>
  <footer>💖 Complete the quick task below to reveal exactly who misses you — Mom, Dad, Ex, Best friend, or even your dog!</footer>
</div>

<script>
  // ----------------------------------------------
  // QUIZ QUESTIONS
  // ----------------------------------------------
  const QUESTIONS = [
    {
      text: "Who was on your mind recently?",
      options: ["An old friend", "My ex", "A family member", "My dog / cat"]
    },
    {
      text: "What time do you feel most emotional?",
      options: ["Early morning", "Late night", "Random moments", "When I'm alone"]
    },
    {
      text: "What message would affect you the most?",
      options: ["“I miss you”", "“Can we talk?”", "“Thinking of you”", "“Come back”"]
    },
    {
      text: "Choose a color that speaks to you:",
      options: ["❤️ Red – passion", "💙 Blue – nostalgia", "💚 Green – loyalty", "🐾 Warm Brown – unconditional love"]
    },
    {
      text: "Are you ready for the truth?",
      options: ["Yes", "Maybe", "Nervous but excited", "Absolutely!"]
    }
  ];

  // ----------------------------------------------
  // REAL PERSON/ANIMAL RESULTS
  // ----------------------------------------------
  const REAL_RESULTS = [
    { name: "💖 Your Mom", message: "Your mom has been thinking about you non-stop. She misses your laugh and hopes you call her soon. She loves you more than words can say." },
    { name: "💪 Your Dad", message: "Your dad misses you more than he shows. He's proud of you and wishes you'd spend more time together. Send him a message today." },
    { name: "💔 Your Ex", message: "Yes, your ex misses you. They've been reminiscing about the good times and wondering if you ever think about them too." },
    { name: "🐶 Your Dog", message: "Your dog goes crazy every time someone mentions your name. That tail wags just for you — they miss you like crazy!" },
    { name: "🐱 Your Cat", message: "Your cat might act independent, but deep down they miss your warmth and late-night cuddles. They've been waiting by the door." },
    { name: "👯 Your Best Friend", message: "Your best friend misses your energy and inside jokes. They keep saying 'I wish (your name) was here'. Text them now!" },
    { name: "👵 Your Grandparent", message: "Your grandparent talks about you all the time. They miss your visits and would love to hear your voice again." }
  ];

  let currentStep = 0;
  let answers = new Array(5).fill(null);
  let quizCompleted = false;
  let isInPreResult = false;
  let isResultUnlocked = false;

  // DOM elements
  const quizBody = document.getElementById('quizBody');
  const progressFill = document.getElementById('progressFill');
  const stepCounterSpan = document.getElementById('stepCounter');

  function updateProgress() {
    let percent = 0;
    if (!quizCompleted) {
      percent = (currentStep / QUESTIONS.length) * 100;
    } else if (isInPreResult) {
      percent = 97;
    } else {
      percent = 100;
    }
    progressFill.style.width = `${percent}%`;
    if (!quizCompleted) {
      stepCounterSpan.innerText = `Question ${currentStep+1} / ${QUESTIONS.length}`;
    } else if (isInPreResult) {
      stepCounterSpan.innerText = `✨ Almost there... 97%`;
    } else {
      stepCounterSpan.innerText = `🔓 Truth revealed`;
    }
  }

  // Generate a consistent result based on answers (maps to a real person)
  function determineWhoMissesYou() {
    if (!answers.every(a => a !== null)) return 0;
    let hash = 0;
    for (let i = 0; i < answers.length; i++) {
      const ans = answers[i] || "";
      for (let c = 0; c < ans.length; c++) {
        hash = ((hash << 5) - hash) + ans.charCodeAt(c);
        hash |= 0;
      }
    }
    // Bias based on first answer for emotional relevance
    let idx = Math.abs(hash) % REAL_RESULTS.length;
    if (answers[0] && answers[0].toLowerCase().includes("ex")) idx = 2;        // ex
    if (answers[0] && answers[0].toLowerCase().includes("family")) idx = 0;    // mom (default family)
    if (answers[0] && answers[0].toLowerCase().includes("dog")) idx = 3;       // dog
    if (answers[0] && answers[0].toLowerCase().includes("cat")) idx = 4;       // cat
    if (answers[0] && answers[0].toLowerCase().includes("friend")) idx = 5;    // best friend
    if (answers[3] && answers[3].toLowerCase().includes("green")) idx = 1;     // dad
    if (answers[3] && answers[3].toLowerCase().includes("brown")) idx = 3;     // dog
    return idx;
  }

  function renderQuestion() {
    if (quizCompleted) return;
    const q = QUESTIONS[currentStep];
    const selectedValue = answers[currentStep];
    const optionsHtml = q.options.map((opt) => {
      const isSelected = (selectedValue === opt);
      return `<button class="option-btn ${isSelected ? 'selected' : ''}" data-opt="${opt.replace(/"/g, '&quot;')}">${opt}</button>`;
    }).join('');

    const navHtml = `
      <div class="nav-buttons">
        <button class="btn btn-secondary" id="prevBtn" ${currentStep === 0 ? 'disabled' : ''}>← Back</button>
        <button class="btn btn-primary" id="nextBtn">${currentStep === QUESTIONS.length-1 ? 'See who misses you ✨' : 'Next →'}</button>
      </div>
    `;

    quizBody.innerHTML = `
      <div class="question-text">${q.text}</div>
      <div class="options-grid" id="optionsGrid">
        ${optionsHtml}
      </div>
      ${navHtml}
    `;

    // attach event listeners to options
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const optText = btn.getAttribute('data-opt') || btn.innerText;
        answers[currentStep] = optText;
        renderQuestion();
      });
    });

    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        if (answers[currentStep] === null) {
          alert("💖 Please choose an answer before continuing.");
          return;
        }
        if (currentStep === QUESTIONS.length-1) {
          if (answers.every(a => a !== null)) {
            quizCompleted = true;
            showTaskToUnlock();
          } else {
            alert("Please complete all questions.");
          }
        } else {
          currentStep++;
          renderQuestion();
          updateProgress();
        }
      });
    }
    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        if (currentStep > 0) {
          currentStep--;
          renderQuestion();
          updateProgress();
        }
      });
    }
    updateProgress();
  }

  // ----------------------------------------------
  // TASK PAGE (No free unlock, only task/CPA)
  // ----------------------------------------------
  function showTaskToUnlock() {
    isInPreResult = true;
    updateProgress();
    
    // store the person who misses the user
    const resultIndex = determineWhoMissesYou();
    window.finalPerson = REAL_RESULTS[resultIndex];
    
    quizBody.innerHTML = `
      <div class="pre-result-box">
        <div class="progress-ring"></div>
        <h3 style="font-size: 1.8rem;">🔐 One step away</h3>
        <p style="margin: 0.8rem 0 0.5rem; font-size:1.1rem;">We’ve matched your energy with someone <strong>real</strong> who misses you.<br>Complete the quick task below to reveal their name and message 💌</p>
        
        <div style="background: #fff0f5; border-radius: 1.5rem; padding: 1.2rem; margin: 1.5rem 0;">
          <p style="font-weight:700; margin-bottom: 0.5rem;">⭐ Complete this simple step:</p>
          <button id="completeTaskBtn" class="offer-btn" style="background:#e8436e; color:white; box-shadow:0 6px 14px rgba(232,67,110,0.3);">
            ✅ Complete Task & Reveal Who Misses You
          </button>
          <p style="font-size:0.7rem; margin-top: 12px; color:#b55a70;">This helps keep the quiz free and magic alive ✨</p>
        </div>
        
        <p style="font-size:0.75rem; border-top: 1px solid #ffd0da; padding-top: 1rem; color:#9b6474;">No spam, just honest reveal. After completing the task you'll see exactly who is thinking of you — Mom, Dad, Ex, your dog, or someone else.</p>
      </div>
    `;
    
    const taskBtn = document.getElementById('completeTaskBtn');
    if (taskBtn) {
      taskBtn.addEventListener('click', () => {
        // CPA / offer link: transparent disclosure
        const cpaUrl = "https://tasks.spin2earncrypto.lat/cl/i/7jvj3v";
        const userConfirmed = confirm("🔓 You'll now be redirected to a sponsor offer. Complete the quick task there, then return here to see who misses you. Continue?");
        if (userConfirmed) {
          // open the offer in new tab
          window.open(cpaUrl, '_blank');
          // after they complete (we assume they will, but we let them click a button to continue)
          // We'll show a small overlay that they can click "I've completed" to be honest.
          showCompletionConfirmation();
        }
      });
    }
  }
  
  function showCompletionConfirmation() {
    // Replace the current pre-result with a confirmation button to ensure user returns & claims result
    quizBody.innerHTML = `
      <div class="pre-result-box" style="text-align:center;">
        <span style="font-size:3rem;">⏳</span>
        <h3>Almost there!</h3>
        <p>Please complete the task in the new tab, then click below to see who misses you 💌</p>
        <button id="confirmCompleteBtn" class="offer-btn" style="background:#42b983; color:white; margin-top:1rem;">
          ✔️ I completed the task – Reveal my result
        </button>
        <p style="margin-top: 1rem; font-size:0.75rem;">(If you haven't finished, go back and complete the sponsor offer)</p>
      </div>
    `;
    const confirmBtn = document.getElementById('confirmCompleteBtn');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', () => {
        // finally unlock the result
        unlockAndShowFinalResult();
      });
    }
  }
  
  function unlockAndShowFinalResult() {
    if (isResultUnlocked) return;
    isResultUnlocked = true;
    isInPreResult = false;
    quizCompleted = true;
    updateProgress();
    showFinalResultWithPerson();
  }
  
  function showFinalResultWithPerson() {
    const person = window.finalPerson || { name: "💖 Someone special", message: "Someone you least expect has been missing you deeply. Trust your heart." };
    quizBody.innerHTML = `
      <div class="result-box">
        <span style="font-size:3.5rem;">💌</span>
        <div class="result-text">
          <span style="display:block; font-size:2rem; margin-bottom:0.5rem;">${person.name}</span>
          ${person.message}
        </div>
        <p style="margin: 0.8rem 0; font-style:italic; background:#ffeef2; padding:0.5rem; border-radius:2rem;">✨ They truly miss you right now ✨</p>
        <button id="restartQuizBtn" class="restart-btn">🔄 Take the test again</button>
        <div style="margin-top: 1.2rem; font-size:0.75rem;">❤️ Send them a sign — a message or a call could make their day.</div>
      </div>
    `;
    const restart = document.getElementById('restartQuizBtn');
    if (restart) {
      restart.addEventListener('click', () => {
        resetFullQuiz();
      });
    }
  }
  
  function resetFullQuiz() {
    currentStep = 0;
    answers = new Array(5).fill(null);
    quizCompleted = false;
    isInPreResult = false;
    isResultUnlocked = false;
    window.finalPerson = null;
    renderQuestion();
    updateProgress();
  }
  
  // start the quiz
  renderQuestion();
</script>
</body>
</html>
